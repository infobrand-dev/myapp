<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Meetra Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Dokumentasi resmi Meetra — platform bisnis untuk UKM Indonesia">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-defaults.css">
  <style>
    :root {
      --theme-color: #2563eb;
      --sidebar-width: 280px;
      --sidebar-background: #f8fafc;
      --sidebar-nav-link-color: #374151;
      --sidebar-nav-link-color--active: #2563eb;
      --sidebar-nav-link-font-weight--active: 600;
      --base-font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      --base-font-size: 15px;
      --base-line-height: 1.7;
      --heading-color: #0f172a;
      --link-color: #2563eb;
      --blockquote-border-color: #2563eb;
      --blockquote-background: #eff6ff;
      --blockquote-color: #1e40af;
      --code-theme-background: #f1f5f9;
      --code-theme-text: #0f172a;
      --table-cell-border-color: #e2e8f0;
      --table-head-background: #f1f5f9;
      --cover-background-color: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);
      --navbar-background: #ffffff;
      --navbar-root-color: #374151;
    }

    body { font-feature-settings: 'cv02','cv03','cv04','cv11'; }

    .sidebar { border-right: 1px solid #e2e8f0; }
    .sidebar .sidebar-nav { padding: 0 0 2rem; }
    .sidebar-nav > ul > li > p {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #94a3b8;
      padding: .75rem 1.25rem .25rem;
      margin: 0;
    }
    .sidebar-nav ul li a {
      border-radius: 6px;
      margin: 1px 8px;
      padding: 5px 12px;
      font-size: 14px;
      transition: background .15s, color .15s;
    }
    .sidebar-nav ul li a:hover { background: #e0e7ff; color: #2563eb; }
    .sidebar-nav ul li.active > a { background: #dbeafe; }

    .app-name-link { font-weight: 700; font-size: 17px; color: #0f172a !important; }
    .app-name { padding: 1.25rem 1.25rem 0.5rem; border-bottom: 1px solid #e2e8f0; margin-bottom: .5rem; }

    .content { max-width: 820px; }
    .markdown-section h1 { font-size: 2rem; font-weight: 800; border-bottom: 2px solid #e2e8f0; padding-bottom: .5rem; margin-bottom: 1.5rem; }
    .markdown-section h2 { font-size: 1.35rem; font-weight: 700; margin-top: 2.5rem; padding-bottom: .3rem; border-bottom: 1px solid #f1f5f9; }
    .markdown-section h3 { font-size: 1.1rem; font-weight: 600; margin-top: 1.75rem; color: #1e40af; }
    .markdown-section table { border-collapse: collapse; width: 100%; }
    .markdown-section table th { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; color: #64748b; }
    .markdown-section blockquote { border-left: 4px solid #2563eb; padding: .75rem 1rem; border-radius: 0 6px 6px 0; }
    .markdown-section blockquote p { margin: 0; }
    .markdown-section code { background: #f1f5f9; color: #0f172a; border-radius: 4px; padding: .15em .4em; font-size: .9em; }
    .markdown-section pre code { background: transparent; padding: 0; color: #e2e8f0; }
    .markdown-section pre { background: #0f172a; border-radius: 8px; color: #e2e8f0; }
    .tip, .warning, .danger, .info {
      padding: .75rem 1rem;
      border-radius: 8px;
      margin: 1.25rem 0;
    }
    .tip { background: #f0fdf4; border-left: 4px solid #16a34a; }
    .warning { background: #fffbeb; border-left: 4px solid #d97706; }
    .info { background: #eff6ff; border-left: 4px solid #2563eb; }

    .search { margin: .75rem 1rem; }
    .search input { border-radius: 8px; border: 1px solid #e2e8f0; font-size: 13px; }

    .pagination-item--next .pagination-item-label, .pagination-item--previous .pagination-item-label { font-size: 13px; color: #64748b; }
    .pagination-item-title { font-size: 15px; font-weight: 600; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'Meetra Docs',
      nameLink: '/docs/',
      repo: '',
      loadSidebar: true,
      loadNavbar: false,
      subMaxLevel: 2,
      search: {
        placeholder: 'Cari dokumentasi...',
        noData: 'Tidak ditemukan.',
        depth: 3,
      },
      pagination: {
        previousText: 'Sebelumnya',
        nextText: 'Selanjutnya',
        crossChapter: true,
        crossChapterText: true,
      },
      routerMode: 'hash',
      topMargin: 20,
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>
</body>
</html>
